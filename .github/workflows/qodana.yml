name: Qodana

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Qodana
        uses: JetBrains/qodana-action@v2024.1
        with:
          args: --linter JetBrains/qodana-python-community:2024.1